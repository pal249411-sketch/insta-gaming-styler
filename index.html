<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="description" content="Best Free Fire Stylish Nicknames Generator and Pro Instagram DP Border Maker. Copy 25+ trending gaming names in one click.">
<meta name="keywords" content="Free Fire name style, Nickfinder Free Fire, gaming nickname generator, DP border maker, stylish font converter, Rohit gaming names">
<meta name="author" content="Rohit">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ PRO Gaming & Profile Studio ⚡</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #7000ff; --accent: #ff007f; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; }
        
        /* Glassmorphism */
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        h1 { text-align: center; font-size: 1.8rem; background: linear-gradient(to right, #00d2ff, #9d4edd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }

        input { width: 100%; padding: 15px; background: #111; border: 2px solid #333; border-radius: 12px; color: white; font-size: 1.1rem; text-align: center; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .card { background: #1a1a1a; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card span { font-size: 1.1rem; font-weight: bold; }

        /* DP Maker */
        .preview { width: 200px; height: 200px; margin: 0 auto; position: relative; display: flex; align-items: center; justify-content: center; }
        #canvas { width: 100%; height: 100%; border-radius: 50%; border: 6px solid var(--accent); object-fit: cover; }
        
        /* Toast Notification */
        #toast { position: fixed; bottom: 30px; background: var(--accent); padding: 15px 30px; border-radius: 50px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔥 PRO Gaming Nicknames</h1>
    
    <div class="glass">
        <input type="text" id="nameInput" placeholder="Enter Name (e.g. Rohit)">
        <div class="grid" id="fontOutput"></div>
    </div>

    <h1>📸 Pro DP Editor</h1>
    <div class="glass">
        <div class="preview"><img id="canvas" src="https://via.placeholder.com/200" alt="DP"></div>
        <input type="file" id="imgInput" style="margin-top: 15px;">
        <div class="grid" style="margin-top: 15px;">
            <button class="card" onclick="changeBorder('#ff007f')">Neon Pink</button>
            <button class="card" onclick="changeBorder('#00d2ff')">Cyber Blue</button>
        </div>
    </div>
</div>

<div id="toast">Copied Successfully!</div>

<script>
    const nameInput = document.getElementById('nameInput');
    const fontOutput = document.getElementById('fontOutput');
    const imgInput = document.getElementById('imgInput');
    const canvas = document.getElementById('canvas');

    const symbols = ["꧁༺{name}༻꧂", "⚡{name}⚡", "亗{name}亗", "☠️{name}☠️", "⚔️{name}⚔️", "★{name}★"];

    nameInput.addEventListener('input', () => {
        const val = nameInput.value || "Rohit";
        fontOutput.innerHTML = '';
        symbols.forEach(s => {
            const nick = s.replace("{name}", val);
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span>${nick}</span>`;
            div.onclick = () => copy(nick);
            fontOutput.appendChild(div);
        });
    });

    imgInput.onchange = e => {
        canvas.src = URL.createObjectURL(e.target.files[0]);
    }

    function changeBorder(color) { canvas.style.borderColor = color; }

    function copy(text) {
        navigator.clipboard.writeText(text);
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }
    
    nameInput.dispatchEvent(new Event('input'));
</script>
</body>
</html>
