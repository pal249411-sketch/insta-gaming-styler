<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social & Gaming Profile Styler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c20, #15102a);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-weight: 800;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #00f2fe;
            border-left: 4px solid #ff007f;
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 35px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid #7f00ff;
            border-radius: 10px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #ff007f;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        @media(min-width: 600px) {
            .results-grid { grid-template-columns: 1fr 1fr; }
        }

        .font-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .font-text {
            font-size: 1.1rem;
            word-break: break-all;
        }

        .copy-btn {
            background: linear-gradient(45deg, #7f00ff, #ff007f);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .copy-btn:hover {
            transform: scale(1.05);
        }

        .tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 600;
        }

        .tab-btn.active {
            background: #ff007f;
        }

        .names-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media(min-width: 600px) {
            .names-list { grid-template-columns: 1fr 1fr; }
        }

        .dp-uploader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .preview-container {
            position: relative;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: #222;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px dashed rgba(255,255,255,0.3);
        }

        .preview-image {
            width: 90%;
            height: 90%;
            border-radius: 50%;
            object-fit: cover;
            display: none;
        }

        .dp-border-effect {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            pointer-events: none;
            border: 8px solid transparent;
        }

        .border-selectors {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .border-opt {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            transition: 0.2s;
        }

        .border-opt:hover { transform: scale(1.1); }

        .b-neon { background: linear-gradient(45deg, #00f2fe, #4facfe); }
        .b-fire { background: linear-gradient(45deg, #ff0844, #ffb199); }
        .b-royal { background: linear-gradient(45deg, #f12711, #f5af19); }
        .b-magic { background: linear-gradient(45deg, #b300a7, #ff007f); }

        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-upload {
            border: 2px solid #00f2fe;
            color: #00f2fe;
            background-color: transparent;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>✨ Profile & Gaming Styler ✨</h1>

        <div class="tool-box">
            <div class="section-title"><i class="fa-solid fa-font"></i> Stylish Font Converter</div>
            <input type="text" id="fontInput" placeholder="Yahan apna naam likhein (e.g. Rohit)...">
            <div class="results-grid" id="fontResults"></div>
        </div>

        <div class="tool-box">
            <div class="section-title"><i class="fa-solid fa-gamepad"></i> Trending Gaming Nicknames</div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('dangerous')">⚔️ Dangerous</button>
                <button class="tab-btn" onclick="switchTab('attitude')">🔥 Attitude</button>
                <button class="tab-btn" onclick="switchTab('ghost')">🕶️ Ghost</button>
                <button class="tab-btn" onclick="switchTab('initials')">👑 Initials</button>
            </div>
            <div class="names-list" id="gamingNamesList"></div>
        </div>

        <div class="tool-box">
            <div class="section-title"><i class="fa-solid fa-circle-user"></i> HD DP Border Maker</div>
            <div class="dp-uploader">
                <div class="preview-container" id="previewBox">
                    <span id="uploadText" style="color: rgba(255,255,255,0.5); font-size: 0.9rem; text-align: center; padding: 10px;">Photo Upload Kijiye</span>
                    <img id="dpPreview" class="preview-image" src="" alt="Preview">
                    <div id="borderOverlay" class="dp-border-effect"></div>
                </div>

                <div class="upload-btn-wrapper">
                    <button class="btn-upload"><i class="fa-solid fa-upload"></i> Choose Image</button>
                    <input type="file" id="imageInput" accept="image/*">
                </div>

                <div style="font-weight: 600; margin-top: 10px;">Select Border Style:</div>
                <div class="border-selectors">
                    <div class="border-opt b-neon" onclick="applyBorder('linear-gradient(45deg, #00f2fe, #4facfe)')"></div>
                    <div class="border-opt b-fire" onclick="applyBorder('linear-gradient(45deg, #ff0844, #ffb199)')"></div>
                    <div class="border-opt b-royal" onclick="applyBorder('linear-gradient(45deg, #f12711, #f5af19)')"></div>
                    <div class="border-opt b-magic" onclick="applyBorder('linear-gradient(45deg, #b300a7, #ff007f)')"></div>
                </div>
                
                <button class="copy-btn" style="margin-top: 15px; padding: 12px 30px; font-size: 1rem;" onclick="downloadImage()"><i class="fa-solid fa-download"></i> Save HD DP</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        const fontMaps = [
            { name: "Script", a: "𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃", A: "𝓐𝓑𝓒𝓓𝓔𝓕𝓖Format𝓘𝓙𝓚𝓛𝓜𝓝Format𝓠𝓡𝓢𝓣𝓤𝓥𝓦Format𝓨𝓩" },
            { name: "Gothic", a: "𝔞𝔟𝔠𝔡𝔢𝔣𝔤𝔥𝔦𝔧𝔨𝔩𝔪𝔫𝔬𝔭𝔮𝔯𝔰𝔱𝔲𝔳𝔴𝔵𝔶𝔷", A: "𝔄𝔅𝔒𝔇𝔈𝔉𝔊𝔧𝔍𝔎𝔏𝔐𝔑𝔔𝔖𝔗𝔘𝔙𝔚𝔛𝔜ℨ" },
            { name: "Circles", a: "ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ", A: "ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏ" },
            { name: "Mathematical", a: "𝖺𝖻𝖼𝖽𝖾𝖿𝖼𝗁𝗂𝗃𝗄𝗅𝗆𝗇𝗈𝗉𝗊𝗋𝗌𝗍𝗎𝗏𝗐𝗑𝗒𝗓", A: "𝖠𝖡𝖢𝖣𝖤𝖥𝖦𝖧𝖨𝖲𝖪𝖫𝖬𝖭𝖮𝖯𝖰𝖱𝖲𝖳𝖴𝖵𝖶𝖷𝖸𝖹" }
        ];

        const gamingNames = {
            dangerous: ["𝔖𝔫𝔦𝔭𝔢𝔯𝔊𝔬𝔡", "𝕯𝖆𝖗𝖐𝕶𝖓𝖎𝖍𝖙", "⚔️Viper_Strike⚔️", "☠️𝕭𝖑𝖔𝖔𝖉𝕳𝖚𝖓𝖙𝖊𝖗☠️", "⚡️KILLER_BOT⚡️", "々🎭CRIMINAL々"],
            attitude: ["亗 KEY_TO_KILL 亗", "⚡️ThunderStorm⚡️", "𝓒𝓱𝓪𝓶𝓿𝓲𝓸𝓷_𝓧", "♛ KING_IS_BACK ♛", "🔥BAD_BOY🔥", "亗MR_PERFECT亗"],
            ghost: ["◥Phantom◤", "░S░𝔥░𝔞░𝔡░𝔬░𝔴░", "〖Glitch〗", "☣️Anonymous☣️", "💥Vanish💥", "👻SOUL_LESS👻"],
            initials: ["⚡ R K ⚡", "亗 R O H I T 亗", "🅳 🆅 🅸 🅳", "〆S A M 〆", "A L O N E", "⚓️ B O S S ⚓️"]
        };

        const fontInput = document.getElementById('fontInput');
        const fontResults = document.getElementById('fontResults');

        fontInput.addEventListener('input', () => {
            const text = fontInput.value || "Rohit";
            fontResults.innerHTML = '';
            
            fontMaps.forEach(map => {
                let converted = '';
                for (let char of text) {
                    if (char >= 'a' && char <= 'z') {
                        converted += map.a[char.charCodeAt(0) - 97];
                    } else if (char >= 'A' && char <= 'Z') {
                        converted += map.A[char.charCodeAt(0) - 65];
                    } else {
                        converted += char;
                    }
                }
                
                const card = document.createElement('div');
                card.className = 'font-card';
                card.innerHTML = `
                    <span class="font-text">${converted}</span>
                    <button class="copy-btn" onclick="copyToClipboard('${converted}')">Copy</button>
                `;
                fontResults.appendChild(card);
            });
        });

        function switchTab(category) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadGamingNames(category);
        }

        function loadGamingNames(category) {
            const listContainer = document.getElementById('gamingNamesList');
            listContainer.innerHTML = '';
            gamingNames[category].forEach(name => {
                const card = document.createElement('div');
                card.className = 'font-card';
                card.innerHTML = `
                    <span class="font-text">${name}</span>
                    <button class="copy-btn" onclick="copyToClipboard('${name}')">Copy</button>
                `;
                listContainer.appendChild(card);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard: ' + text);
            });
        }

        const imageInput = document.getElementById('imageInput');
        const dpPreview = document.getElementById('dpPreview');
        const uploadText = document.getElementById('uploadText');
        const borderOverlay = document.getElementById('borderOverlay');

        imageInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    dpPreview.src = e.target.result;
                    dpPreview.style.display = 'block';
                    uploadText.style.display = 'none';
                }
                reader.readAsDataURL(file);
            }
        });

        function applyBorder(gradient) {
            borderOverlay.style.borderImage = `${gradient} 1`;
            borderOverlay.style.borderStyle = 'solid';
        }

        function downloadImage() {
            const previewBox = document.getElementById('previewBox');
            html2canvas(previewBox, { backgroundColor: null, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'stylish-dp.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        fontInput.dispatchEvent(new Event('input'));
        loadGamingNames('dangerous');
    </script>
</body>
</html>
